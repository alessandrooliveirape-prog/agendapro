services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: agendapro-backend
    restart: always
    env_file:
      - backend/.env
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agendapro-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: agendapro-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: agendapro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  postgres_data:
